<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block page_title %}Chart{% endblock %}</title>
  <style>
    body { font-family: "Avenir Next", "Trebuchet MS", sans-serif; margin: 24px; background: #f7f8fa; color: #202833; }
    .card { max-width: 1240px; margin: 0 auto; background: #fff; border: 1px solid #dde3ea; border-radius: 14px; padding: 18px; }
    h1 { margin: 0 0 8px; }
    p { margin-top: 0; color: #4d5b6b; }
    .chart-wrap { border: 1px solid #e2e8ef; border-radius: 10px; padding: 12px; margin-bottom: 16px; background: #fbfdff; }
    .chart-wrap canvas { width: 100%; max-height: 460px; }
    .table-wrap { border: 1px solid #e2e8ef; border-radius: 10px; overflow: auto; margin-bottom: 14px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    th, td { padding: 8px 10px; border-bottom: 1px solid #edf1f5; text-align: left; white-space: nowrap; vertical-align: top; }
    th { background: #f3f7fb; position: sticky; top: 0; }
    a { color: #0d6a6d; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .mode-row { display: flex; gap: 8px; margin: 8px 0 12px; }
    .mode-link { border: 1px solid #0d6a6d; border-radius: 6px; padding: 5px 10px; font-size: 0.82rem; }
    .mode-link.active { background: #0d6a6d; color: #fff; }
    .range-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0 12px; }
    .range-btn { border: 1px solid #8795a5; background: #fff; color: #2d3b4b; border-radius: 6px; padding: 5px 10px; font-size: 0.8rem; cursor: pointer; }
    .range-btn.active { border-color: #0d6a6d; background: #0d6a6d; color: #fff; }
    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  <div class="card">
    {% block card_content %}{% endblock %}
  </div>
  {% block chart_library %}{% endblock %}
  {% block page_script %}{% endblock %}
</body>
</html>
