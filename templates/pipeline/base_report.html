{% extends "pipeline/base_app.html" %}

{% block page_body %}
  <div class="page-header">
    <div class="eyebrow">{% block report_eyebrow %}Report{% endblock %}</div>
    <h1 class="page-header-title">{% block report_title %}Report{% endblock %}</h1>
    <p class="page-subtitle">{% block report_subtitle %}{% endblock %}</p>
  </div>

  <div class="page-grid page-grid-sidebar">
    <aside class="section-card">
      {% block report_sidebar %}{% endblock %}
    </aside>
    <section class="stack">
      {% block report_content %}{% endblock %}
    </section>
  </div>
{% endblock %}
