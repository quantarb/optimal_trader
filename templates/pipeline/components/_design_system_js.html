<script>
  (function () {
    function parseValue(text) {
      const raw = String(text || "").trim();
      if (!raw) {
        return { type: "text", value: "" };
      }
      const normalized = raw
        .replace(/[$,%]/g, "")
        .replace(/,/g, "")
        .replace(/([0-9])K$/i, "$1e3")
        .replace(/([0-9])M$/i, "$1e6")
        .replace(/([0-9])B$/i, "$1e9")
        .replace(/([0-9])T$/i, "$1e12");
      const numeric = Number(normalized);
      if (!Number.isNaN(numeric) && normalized !== "") {
        return { type: "number", value: numeric };
      }
      return { type: "text", value: raw.toLowerCase() };
    }

    function enhanceTable(table) {
      if (!table || table.dataset.enhanced === "1") {
        return;
      }
      const tbody = table.tBodies[0];
      if (!tbody) {
        return;
      }
      const rows = Array.from(tbody.rows);
      if (!rows.length) {
        return;
      }

      const pageSize = Math.max(1, parseInt(table.dataset.pageSize || "12", 10));
      const shell = table.closest(".data-table-shell") || table.parentElement;
      if (!shell) {
        return;
      }

      const controls = document.createElement("div");
      controls.className = "data-table-controls";
      controls.innerHTML = [
        '<div class="pagination"><strong class="caption">Table Controls</strong><span class="caption js-table-status"></span></div>',
        '<div class="pagination">',
        '<input type="search" class="js-table-search" placeholder="Filter rows">',
        '<button type="button" class="js-table-prev">Prev</button>',
        '<button type="button" class="js-table-next">Next</button>',
        "</div>",
      ].join("");
      shell.insertBefore(controls, shell.firstChild);

      const statusEl = controls.querySelector(".js-table-status");
      const searchEl = controls.querySelector(".js-table-search");
      const prevEl = controls.querySelector(".js-table-prev");
      const nextEl = controls.querySelector(".js-table-next");
      const headers = Array.from(table.querySelectorAll("thead th"));

      const state = {
        page: 1,
        pageSize: pageSize,
        query: "",
        sortIndex: -1,
        sortDirection: 1,
      };

      function render() {
        let filtered = rows.filter((row) => row.textContent.toLowerCase().includes(state.query));
        if (state.sortIndex >= 0) {
          filtered = filtered.slice().sort(function (left, right) {
            const leftValue = parseValue(left.cells[state.sortIndex] ? left.cells[state.sortIndex].textContent : "");
            const rightValue = parseValue(right.cells[state.sortIndex] ? right.cells[state.sortIndex].textContent : "");
            if (leftValue.type === "number" && rightValue.type === "number") {
              return (leftValue.value - rightValue.value) * state.sortDirection;
            }
            return String(leftValue.value).localeCompare(String(rightValue.value)) * state.sortDirection;
          });
        }
        filtered.forEach(function (row) {
          tbody.appendChild(row);
        });
        const totalPages = Math.max(1, Math.ceil(filtered.length / state.pageSize));
        if (state.page > totalPages) {
          state.page = totalPages;
        }
        const start = (state.page - 1) * state.pageSize;
        const end = start + state.pageSize;
        filtered.forEach(function (row, index) {
          row.style.display = index >= start && index < end ? "" : "none";
        });
        rows
          .filter(function (row) { return filtered.indexOf(row) === -1; })
          .forEach(function (row) { row.style.display = "none"; });
        statusEl.textContent = filtered.length + " rows, page " + state.page + " / " + totalPages;
        prevEl.disabled = state.page <= 1;
        nextEl.disabled = state.page >= totalPages;
      }

      searchEl.addEventListener("input", function (event) {
        state.query = String(event.target.value || "").trim().toLowerCase();
        state.page = 1;
        render();
      });
      prevEl.addEventListener("click", function () {
        state.page = Math.max(1, state.page - 1);
        render();
      });
      nextEl.addEventListener("click", function () {
        state.page += 1;
        render();
      });
      headers.forEach(function (header, index) {
        if (String(header.dataset.sortable || "true") === "false") {
          return;
        }
        header.addEventListener("click", function () {
          if (state.sortIndex === index) {
            state.sortDirection *= -1;
          } else {
            state.sortIndex = index;
            state.sortDirection = 1;
          }
          render();
        });
      });
      table.dataset.enhanced = "1";
      render();
    }

    document.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll("table.js-data-table").forEach(enhanceTable);
    });
  }());
</script>
